<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>העוזר שלי</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700&family=Noto+Serif+Hebrew:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0e0e11;
      --surface: #16161c;
      --surface2: #1e1e28;
      --border: #2a2a38;
      --accent: #7c6af7;
      --accent2: #a78bfa;
      --text: #e8e8f0;
      --text-dim: #888899;
      --user-bubble: #1e1b40;
      --ai-bubble: #161622;
      --glow: rgba(124, 106, 247, 0.15);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Heebo', sans-serif;
      background: var(--bg);
      color: var(--text);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      top: -20%;
      right: -10%;
      width: 60vw;
      height: 60vw;
      background: radial-gradient(circle, rgba(124,106,247,0.08) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }
    header {
      position: relative;
      z-index: 10;
      padding: 14px 20px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .logo {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      box-shadow: 0 0 20px var(--glow);
      flex-shrink: 0;
    }
    .header-text h1 {
      font-family: 'Noto Serif Hebrew', serif;
      font-size: 17px;
      font-weight: 700;
    }
    .header-text p {
      font-size: 11px;
      color: var(--text-dim);
      display: flex;
      align-items: center;
      gap: 5px;
    }
    .status-dot {
      width: 7px;
      height: 7px;
      background: #4ade80;
      border-radius: 50%;
      display: inline-block;
      animation: pulse-dot 2s infinite;
    }
    @keyframes pulse-dot {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      position: relative;
      z-index: 1;
      scroll-behavior: smooth;
    }
    #chat::-webkit-scrollbar { width: 4px; }
    #chat::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
    .message {
      display: flex;
      gap: 10px;
      animation: fadeSlideIn 0.3s ease;
    }
    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .message.user { flex-direction: row-reverse; }
    .avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      margin-top: 2px;
    }
    .message.user .avatar {
      background: var(--user-bubble);
      border: 1px solid var(--accent);
    }
    .message.ai .avatar {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      box-shadow: 0 0 12px var(--glow);
    }
    .bubble {
      max-width: min(75vw, 520px);
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 15px;
      line-height: 1.65;
      word-break: break-word;
    }
    .message.user .bubble {
      background: var(--user-bubble);
      border: 1px solid rgba(124,106,247,0.3);
      border-top-left-radius: 4px;
    }
    .message.ai .bubble {
      background: var(--ai-bubble);
      border: 1px solid var(--border);
      border-top-right-radius: 4px;
    }
    .bubble strong { color: var(--accent2); }
    .bubble code {
      background: rgba(255,255,255,0.06);
      padding: 1px 5px;
      border-radius: 4px;
      font-size: 13px;
      font-family: monospace;
    }
    .bubble pre {
      background: rgba(0,0,0,0.3);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px;
      overflow-x: auto;
      margin-top: 8px;
      font-size: 13px;
    }
    .typing-indicator {
      display: flex;
      gap: 5px;
      align-items: center;
      padding: 12px 14px;
    }
    .typing-indicator span {
      width: 8px;
      height: 8px;
      background: var(--accent);
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 80%, 100% { transform: translateY(0); opacity: 0.4; }
      40% { transform: translateY(-6px); opacity: 1; }
    }
    .welcome {
      text-align: center;
      padding: 40px 20px;
      animation: fadeSlideIn 0.5s ease;
    }
    .welcome-icon { font-size: 48px; margin-bottom: 16px; }
    .welcome h2 {
      font-family: 'Noto Serif Hebrew', serif;
      font-size: 22px;
      margin-bottom: 8px;
    }
    .welcome p {
      font-size: 14px;
      color: var(--text-dim);
      line-height: 1.6;
      max-width: 280px;
      margin: 0 auto 20px;
    }
    .suggestions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: center;
    }
    .suggestion-chip {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 7px 14px;
      font-size: 13px;
      color: var(--text-dim);
      cursor: pointer;
      transition: all 0.2s;
      font-family: 'Heebo', sans-serif;
    }
    .suggestion-chip:hover {
      border-color: var(--accent);
      color: var(--accent2);
      background: rgba(124,106,247,0.1);
    }
    #input-area {
      position: relative;
      z-index: 10;
      padding: 12px 16px;
      background: var(--surface);
      border-top: 1px solid var(--border);
    }
    .input-wrapper {
      display: flex;
      gap: 8px;
      align-items: flex-end;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 8px 8px 8px 12px;
      transition: border-color 0.2s;
    }
    .input-wrapper:focus-within {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--glow);
    }
    #user-input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: var(--text);
      font-size: 15px;
      font-family: 'Heebo', sans-serif;
      resize: none;
      max-height: 140px;
      min-height: 24px;
      line-height: 1.5;
      direction: rtl;
    }
    #user-input::placeholder { color: var(--text-dim); }
    #send-btn {
      width: 38px;
      height: 38px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border: none;
      border-radius: 10px;
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
      flex-shrink: 0;
    }
    #send-btn:hover { transform: scale(1.08); }
    #send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
    #send-btn svg { width: 18px; height: 18px; }
    @media (max-width: 480px) {
      .bubble { max-width: 82vw; font-size: 14px; }
    }
  </style>
</head>
<body>
<header>
  <div class="logo">✦</div>
  <div class="header-text">
    <h1>העוזר שלי</h1>
    <p><span class="status-dot"></span> מחובר ומוכן לעזור</p>
  </div>
</header>
<div id="chat">
  <div class="welcome" id="welcome">
    <div class="welcome-icon">✦</div>
    <h2>שלום! אני העוזר שלך</h2>
    <p>אני יכול לעזור עם כל שאלה, לחפש מידע עדכני, לכתוב, לתכנת ועוד.</p>
    <div class="suggestions">
      <div class="suggestion-chip" onclick="sendSuggestion('מה מזג האוויר בתל אביב היום?')">🌤 מזג אוויר</div>
      <div class="suggestion-chip" onclick="sendSuggestion('תסביר לי מה זה בינה מלאכותית')">🧠 בינה מלאכותית</div>
      <div class="suggestion-chip" onclick="sendSuggestion('תכתוב לי מייל מקצועי')">✉️ כתיבת מייל</div>
      <div class="suggestion-chip" onclick="sendSuggestion('עזור לי לכתוב קוד Python פשוט')">💻 קוד Python</div>
    </div>
  </div>
</div>
<div id="input-area">
  <div class="input-wrapper">
    <textarea id="user-input" placeholder="שאל אותי כל דבר..." rows="1"></textarea>
    <button id="send-btn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <line x1="22" y1="2" x2="11" y2="13"></line>
        <polygon points="22 2 15 22 11 13 2 9 22 2"></polygon>
      </svg>
    </button>
  </div>
</div>
<script>
  const BACKEND_URL = "";

  const chatEl = document.getElementById("chat");
  const inputEl = document.getElementById("user-input");
  const sendBtn = document.getElementById("send-btn");
  let messages = [];
  let isLoading = false;

  inputEl.addEventListener("input", function () {
    this.style.height = "24px";
    this.style.height = Math.min(this.scrollHeight, 140) + "px";
  });

  inputEl.addEventListener("keydown", function (e) {
    if (e.key === "Enter" && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });

  function sendSuggestion(text) {
    inputEl.value = text;
    sendMessage();
  }

  function renderMarkdown(text) {
    return text
      .replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>")
      .replace(/\*(.*?)\*/g, "<em>$1</em>")
      .replace(/`([^`]+)`/g, "<code>$1</code>")
      .replace(/```([\s\S]*?)```/g, "<pre><code>$1</code></pre>")
      .replace(/\n/g, "<br>");
  }

  function addMessage(role, content) {
    const welcome = document.getElementById("welcome");
    if (welcome) welcome.remove();
    const div = document.createElement("div");
    div.className = `message ${role}`;
    const avatar = document.createElement("div");
    avatar.className = "avatar";
    avatar.textContent = role === "user" ? "👤" : "✦";
    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.innerHTML = renderMarkdown(content);
    div.appendChild(avatar);
    div.appendChild(bubble);
    chatEl.appendChild(div);
    chatEl.scrollTop = chatEl.scrollHeight;
  }

  function showTyping() {
    const div = document.createElement("div");
    div.className = "message ai";
    div.id = "typing";
    const avatar = document.createElement("div");
    avatar.className = "avatar";
    avatar.textContent = "✦";
    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.innerHTML = `<div class="typing-indicator"><span></span><span></span><span></span></div>`;
    div.appendChild(avatar);
    div.appendChild(bubble);
    chatEl.appendChild(div);
    chatEl.scrollTop = chatEl.scrollHeight;
  }

  function removeTyping() {
    const el = document.getElementById("typing");
    if (el) el.remove();
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || isLoading) return;
    isLoading = true;
    sendBtn.disabled = true;
    inputEl.value = "";
    inputEl.style.height = "24px";
    messages.push({ role: "user", content: text });
    addMessage("user", text);
    showTyping();
    try {
      const res = await fetch(`${BACKEND_URL}/chat`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ messages })
      });
      const data = await res.json();
      removeTyping();
      if (data.response) {
        messages.push({ role: "assistant", content: data.response });
        addMessage("ai", data.response);
      } else {
        addMessage("ai", "מצטער, הייתה שגיאה. נסה שוב.");
      }
    } catch (err) {
      removeTyping();
      addMessage("ai", "❌ לא הצלחתי להתחבר לשרת. ודא שה-backend פעיל.");
    }
    isLoading = false;
    sendBtn.disabled = false;
    inputEl.focus();
  }
</script>
</body>
</html>
